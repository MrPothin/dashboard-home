<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F0F1A" />
  <title>Dashboard — Wesley & Lauriane</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark">

  <!-- PAGE CONNEXION -->
  <div id="page-login" class="page active">
    <div class="login-card">
      <h1>👋 Bon retour</h1>
      <p class="subtitle">Wesley & Lauriane</p>
      <input type="email" id="email" placeholder="Email" autocomplete="username" />
      <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" />
      <button id="btn-login">Se connecter</button>
      <p id="login-error" class="error"></p>
    </div>
  </div>

  <!-- PAGE DASHBOARD -->
  <div id="page-dashboard" class="page">

    <!-- Barre du haut (mobile uniquement) -->
    <header class="topbar">
      <div class="logo">🏠 Dashboard</div>
      <div class="topbar-actions">
        <button class="btn-icon btn-theme" title="Thème">🌙</button>
        <button class="btn-icon btn-logout" title="Déconnexion">⏻</button>
      </div>
    </header>

    <!-- Sidebar PC / barre du bas mobile (liens générés par app.js) -->
    <nav class="sidebar">
      <div class="logo sidebar-logo">🏠 Dashboard</div>
      <div id="nav-links" class="nav-links"></div>
      <div class="nav-bottom">
        <button class="btn-theme">🌙 Thème</button>
        <button class="btn-logout">Déconnexion</button>
      </div>
    </nav>

    <main id="content" class="content"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
